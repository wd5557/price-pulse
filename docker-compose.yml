version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: pricepulse_db
    environment:
      POSTGRES_USER: pricepulse
      POSTGRES_PASSWORD: pricepulse_dev
      POSTGRES_DB: pricepulse
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pricepulse"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - pricepulse_network

  redis:
    image: redis:7-alpine
    container_name: pricepulse_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - pricepulse_network

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: pricepulse_api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://pricepulse:pricepulse_dev@db:5432/pricepulse
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: your-secret-key-change-in-production
      ENVIRONMENT: development
      KEEPA_API_KEY: ${KEEPA_API_KEY}
      EBAY_APP_ID: ${EBAY_APP_ID}
      EBAY_CERT_ID: ${EBAY_CERT_ID}
      EBAY_DEV_ID: ${EBAY_DEV_ID}
      WALMART_API_KEY: ${WALMART_API_KEY}
    volumes:
      - ./api:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pricepulse_network

  celery_worker:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: pricepulse_worker
    command: celery -A worker.celery worker --loglevel=info
    environment:
      DATABASE_URL: postgresql://pricepulse:pricepulse_dev@db:5432/pricepulse
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: your-secret-key-change-in-production
      ENVIRONMENT: development
    volumes:
      - ./api:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pricepulse_network

  celery_beat:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: pricepulse_beat
    command: celery -A worker.celery beat --loglevel=info
    environment:
      DATABASE_URL: postgresql://pricepulse:pricepulse_dev@db:5432/pricepulse
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: your-secret-key-change-in-production
      ENVIRONMENT: development
    volumes:
      - ./api:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pricepulse_network

volumes:
  postgres_data:
  redis_data:

networks:
  pricepulse_network:
    driver: bridge
